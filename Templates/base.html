{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <script src="https://unpkg.com/ionicons@5.0.0/dist/ionicons.js"></script>
    <title>{% block title %}{% endblock %}</title>
    <script src="{% static 'main.js' %}" defer></script>
</head>
<body>
    <nav class="navbar sticky-top z-3 shadow p-3 navbar-expand-lg bg-body">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'home' %}">
              <!-- <img src="/Static/Img/to-do-list-logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top object-fit-cover"> -->
              To Do List
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <!-- <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li> -->
              <!-- <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Dropdown
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item" href="#">Something else here</a></li>
                </ul>
              </li> -->
              {% if user.is_authenticated %}
              <li class="nav-item row mx-5 px-5 text-center">
                <a class="nav-link disabled fs-6"><span class="">Hello {{ user.username }}</span> <ion-icon name="happy"></ion-icon></a>
              </li>
              {% endif %}
            </ul>
            <form method="POST" action="{% url 'search_list' %}" class="d-flex me-5 mb-1" role="search">
              {% csrf_token %}
              <input class="form-control me-2" name="searched" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-info" type="submit"><i class="fa fa-search" aria-hidden="true"></i></button>
            </form>
            {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="btn btn-outline-danger rounded-pill">Logout</a>
            {% else %}
            <a href="{% url 'login' %}" class="get-started btn btn-success rounded-pill">Get Started</a>
            {% endif %}
          </div>
        </div>
    </nav>

    <!-- <ul class="nav p-3 nav-tabs">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Active</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled">Disabled</a>
        </li>
    </ul> -->
    <section class="d-flex flex-wrap justify-content-center align-items-center p-3 m-2">
        {% block content %}
    
        {% endblock %}
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
  </body>
</html>
